# Zoho Smart Kiosk -- Docker Compose Stack
# Uses host networking (ports bind directly to the server).
#
# Setup:
#   1. bash host-setup.sh  (one-time, loads virtual camera kernel module)
#   2. cp .env.example .env && nano .env
#   3. docker compose up -d --build

name: zoho-kiosk

volumes:
  chrome-profile:
    driver: local
  events-log:
    driver: local

services:

  # Camera feed bridge
  # Pulls MJPEG from ESP32-CAM and writes to /dev/video10 (v4l2loopback).
  zoho-camera-feed:
    build:
      context: ./camera-feed
      dockerfile: Dockerfile
    container_name: zoho-camera-feed
    restart: unless-stopped
    network_mode: host
    environment:
      - ESP32_CAM_IP=${ESP32_CAM_IP:-192.168.1.151}
      - ESP32_CAM_PORT=${ESP32_CAM_PORT:-80}
      - ESP32_CAM_STREAM_PATH=${ESP32_CAM_STREAM_PATH:-/stream}
      - TZ=${TZ:-Asia/Kolkata}
    devices:
      - /dev/video10:/dev/video10

  # Kiosk browser
  # Xvfb + Chrome (kiosk mode) + x11vnc.
  # Ports: 5900 (VNC), 9222 (Chrome DevTools Protocol).
  zoho-kiosk:
    build:
      context: ./kiosk
      dockerfile: Dockerfile
    container_name: zoho-kiosk
    restart: unless-stopped
    network_mode: host
    environment:
      - ZOHO_KIOSK_URL=${ZOHO_KIOSK_URL:-https://people.zoho.in/YourCompany/kiosk}
      - SCREEN_RESOLUTION=${SCREEN_RESOLUTION:-1280x800x24}
      - CDP_PORT=${CDP_PORT:-9222}
      - VNC_PASSWORD=${VNC_PASSWORD:-zoho1234}
      - TZ=${TZ:-Asia/Kolkata}
    devices:
      - /dev/video10:/dev/video10
    shm_size: '256mb'
    cap_add:
      - SYS_ADMIN
    volumes:
      - chrome-profile:/root/.config/google-chrome
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${CDP_PORT:-9222}/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Node.js middleware
  # Button API, Chrome DevTools bridge, dashboard, camera proxy.
  # Port: 5003.
  zoho-middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    container_name: zoho-middleware
    restart: unless-stopped
    network_mode: host
    environment:
      - MIDDLEWARE_PORT=5003
      - CDP_HOST=127.0.0.1
      - CDP_PORT=${CDP_PORT:-9222}
      - ESP32_CAM_IP=${ESP32_CAM_IP:-192.168.1.151}
      - LOG_DIR=/var/log/zoho-kiosk
      - TZ=${TZ:-Asia/Kolkata}
    volumes:
      - events-log:/var/log/zoho-kiosk
    depends_on:
      - zoho-kiosk
